<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Supr Nova | منصة مشاركة الملخصات والملفات الجامعية</title>
  <meta name="description" content="موقع Supr Nova لطلاب الجامعة - شارك وحمل الملخصات، المحاضرات، والروابط الأكاديمية والمواد الدراسية بسهولة." />
  <meta name="google-site-verification" content="EqPjtwkQzxG4LWWjGcSugI0Po0l3k0UTUH0IHrxqhjY" />
  <link rel="stylesheet" href="style.css" />
  <link rel="shortcut icon" href="assets/favicon.jpeg" type="image/x-icon" />
</head>
<body>
  <div class="hall"></div>
  
  <main class="container">
    <section class="title-wrap">
      <img src="assets/logo.jpeg" alt="SuperNova Logo" class="logo-img" />
      <h1>SuperNova</h1>
      <p style="color: rgba(255,255,255,.6); margin-top: 0.5rem;">Choose Your Year</p>
    </section>

    <!-- Search -->
    <div style="margin: 2rem 0; position: relative;">
      <input type="text" id="searchInput" placeholder="🔍 Quick search subjects..." style="width: 100%; padding: 0.8rem; border-radius: 12px; border: 1px solid rgba(255,255,255,.2); background: rgba(255,255,255,.08); color: #fff; font-size: 1rem; outline: none; backdrop-filter: blur(10px);" />
      <div id="searchDropdown" style="position: absolute; top: 100%; left: 0; right: 0; margin-top: 0.5rem; background: rgba(20, 25, 45, 0.95); border-radius: 12px; border: 1px solid rgba(255,255,255,.2); max-height: 250px; overflow-y: auto; z-index: 100; display: none;"></div>
    </div>

    <section id="cards" class="cards-grid" style="margin-top: 2rem;">
      <a href="year1.html" class="card color-year1">
        <h3 class="subject-title">Year 1</h3>
        <div style="margin-top: 1rem; font-size: 2.5rem;">📚</div>
      </a>

      <a href="year2.html" class="card color-year2">
        <h3 class="subject-title">Year 2</h3>
        <div style="margin-top: 1rem; font-size: 2.5rem;">🎓</div>
      </a>
    </section>

    <!-- Share Button -->
    <div style="text-align: center; margin: 3rem 0;">
      <button id="shareBtn" class="page-btn" style="padding: 0.8rem 1.6rem; font-size: 1rem;">📤 Share Website</button>
    </div>
  </main>

  <script src="theme.js"></script>
  <script src="script.js"></script>
  <script>
    // ============ SMART SEARCH (INDEX ONLY) ============
    const subjects = [
      // Semester 1
      { name: "Physics", page: "physics.html", semester: 1 },
      { name: "Math 0", page: "math0.html", semester: 1 },
      { name: "Math 1", page: "math1.html", semester: 1 },
      { name: "Ethics", page: "ethics.html", semester: 1 },
      { name: "Intro CS", page: "intro_cs.html", semester: 1 },
      { name: "English", page: "english.html", semester: 1 },
      { name: "E-Commerce", page: "ecommerce.html", semester: 1 },
      // Semester 2
      { name: "Programming", page: "programming.html", semester: 2 },
      { name: "Logic", page: "logic.html", semester: 2 },
      { name: "Discrete Math", page: "discrete.html", semester: 2 },
      { name: "Cyber Security", page: "cyber.html", semester: 2 },
      { name: "AI", page: "ai.html", semester: 2 },
      { name: "Electronics", page: "electronics.html", semester: 2 }
    ];

    function setupSearch() {
      const searchInput = document.getElementById("searchInput");
      const searchDropdown = document.getElementById("searchDropdown");
      
      searchInput.addEventListener("input", (e) => {
        const query = e.target.value.toLowerCase().trim();
        
        if (!query) {
          searchDropdown.innerHTML = "";
          searchDropdown.style.display = "none";
          return;
        }
        
        const results = subjects
          .filter(s => s.name.toLowerCase().includes(query))
          .slice(0, 5);
        
        if (results.length === 0) {
          searchDropdown.innerHTML = "<div style='padding: 1rem; text-align: center; color: rgba(255,255,255,.5);'>No results found</div>";
          searchDropdown.style.display = "block";
          return;
        }
        
        searchDropdown.innerHTML = results
          .map(s => `<div style='padding: 0.8rem 1rem; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,.1); color: rgba(255,255,255,.8);' onclick="window.location.href='${s.page}'">${s.name}</div>`)
          .join("");
        searchDropdown.style.display = "block";
      });
      
      document.addEventListener("click", (e) => {
        if (e.target !== searchInput && e.target.parentElement !== searchDropdown) {
          searchDropdown.style.display = "none";
        }
      });
    }

    // Initialize on page load
    document.addEventListener("DOMContentLoaded", () => {
      setupSearch();
    });
  </script>
</body>
</html>
