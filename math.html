<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>مادة الرياضيات | Supr Nova</title>
  <meta name="description" content="ملخصات وموارد مادة الرياضيات لطلاب الجامعة من Supr Nova." />
  <link rel="stylesheet" href="style.css" />
  <link rel="shortcut icon" href="./assets/Fav%20Icon.jpeg" type="image/x-icon" />
</head>
<body>
  <div class="hall"></div>
  
  <main class="container">
    <article class="subject-page" data-subject="discrete">
      <section class="title-wrap">
        <h1>📊 Discrete Math</h1>
        <button class="page-btn back-btn" type="button" onclick="goBack('semester2.html')">⬅ Back</button>
      </section>

      <div style="margin: 2rem 0;">
        <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
          <span style="color: rgba(255,255,255,.8);">Progress</span>
          <span id="progress_discrete" style="color: rgba(255,255,255,.6); min-width: 40px;">0%</span>
        </div>
        <div style="width: 100%; height: 8px; background: rgba(255,255,255,.1); border-radius: 10px; overflow: hidden;">
          <div id="progress_discrete_bar" style="width: 0%; height: 100%; background: linear-gradient(90deg, #58d5ff, #96f2f2); transition: width .3s ease;"></div>
        </div>
      </div>

      <div style="display: flex; gap: 1rem; margin: 2rem 0; flex-wrap: wrap;">
        <button class="page-btn" style="flex: 1; text-align: center; opacity: 0.6;">🎥 Watch Videos</button>
        <button class="page-btn" style="flex: 1; text-align: center; opacity: 0.6;">📁 Open Files</button>
      </div>

      <button class="page-btn" id="favBtn" style="width: 100%; margin-bottom: 1rem;">☆ Add to Favorites</button>

      <div style="margin: 2rem 0;">
        <h3 style="margin-bottom: 0.5rem; font-size: 1rem; color: rgba(255,255,255,.9);">📝 Your Notes</h3>
        <textarea class="notes-textarea" id="notesTextarea" placeholder="Write your notes here..." style="width: 100%; min-height: 120px; padding: 0.8rem; border: 1px solid rgba(255,255,255,.2); border-radius: 8px; background: rgba(255,255,255,.08); color: #fff; font-family: inherit; font-size: 0.9rem; resize: vertical; outline: none;"></textarea>
      </div>
    </article>
  </main>

  <script src="theme.js"></script>
  <script src="script.js"></script>
</body>
</html>
