<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>مقدمة | Supr Nova</title>
  <meta name="description" content="صفحة تعريفية ومقدمة لمرحباً بطلاب Supr Nova ومحتويات المنصة." />
  <link rel="shortcut icon" href="assets/favicon.jpeg" type="image/x-icon" />
  <style>
    body { margin:0; height:100vh; display:grid; place-items:center; background:#000; color:#fff; overflow:hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    .intro { text-align:center; animation: fadeScreen 2.5s ease-in-out forwards; }
    .logo { font-size: clamp(3.4rem, 14vw, 10rem); letter-spacing: .6rem; font-family: 'Segoe UI', Tahoma, sans-serif; font-weight: 900;
      color:#f6ecff; text-transform: uppercase;
      text-shadow: 0 0 25px rgba(160, 110, 255, .8), 0 0 40px #84f4ff, 0 0 90px rgba(221, 0, 255, .48), 0 0 140px rgba(255, 255, 255, .3);
      animation: fadezoom 2.5s ease-in-out 1 forwards;
    }
    .subtitle { margin-top:1rem; font-size: clamp(1.3rem, 2.6vw, 2rem); color:#9ecbff;
      opacity:0; animation: subFade 1.5s ease forwards 1.05s;
    }
    @keyframes fadezoom { 0% { transform: scale(.55); opacity: 0; filter: blur(3px); }
      50% { transform: scale(1.15); opacity: 1; filter: blur(0); }
      80% { transform: scale(1.03); opacity: 1; }
      100% { transform: scale(0.95); opacity: 0; }
    }
    @keyframes subFade { 0% { opacity: 0; } 45% { opacity:1;} 90% { opacity:1;} 100% { opacity:0;} }
    @keyframes fadeScreen { 0% { opacity: 0; } 15% { opacity: 1; } 85% { opacity: 1; } 100% { opacity: 0; }}
  </style>
  <script>
    setTimeout(()=> { window.location.href='index.html'; }, 2500);
  </script>
</head>
<body>
  <div class="intro">
    <img src="assets/logo.jpeg" alt="SuperNova Logo" class="logo-img" />
    <div class="logo">SUPER NOVA</div>
    <div class="subtitle">Premium Futuristic Learning</div>
  </div>
</body>
</html>
